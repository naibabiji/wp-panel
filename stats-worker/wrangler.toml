name = "wp-panel-stats"
main = "index.js"
compatibility_date = "2025-01-01"

# Worker 接收面板匿名心跳上报，并提供公开统计 API。
# 部署前需要先创建 KV namespace：
#   wrangler kv:namespace create "STATS_KV"
# 然后把输出的 id 填入下方双引号内。

[[kv_namespaces]]
binding = "STATS_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_NAMESPACE_ID"
