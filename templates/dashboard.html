{{template "base" .}}
{{define "dashboard_content"}}
<div>
    <div class="flex items-center justify-between mb-6" x-data="versionCheck()" x-init="check()">
        <div class="flex items-center space-x-3">
            <h2 class="text-xl font-bold text-white">控制台</h2>
            <span class="text-xs text-gray-500 bg-gray-800 px-2 py-0.5 rounded">{{.PanelVersion}}</span>
            <a x-show="hasUpdate" href="/{{.RandomSuffix}}/settings" class="text-xs bg-yellow-600 text-yellow-100 px-2 py-0.5 rounded hover:bg-yellow-500" x-text="'发现新版本 ' + latestVersion"></a>
            <a x-show="sysCount > 0" href="/{{.RandomSuffix}}/settings" class="text-xs bg-red-700 text-red-100 px-2 py-0.5 rounded hover:bg-red-600" x-text="sysCount + ' 个系统更新'"></a>
            <span x-show="checking" class="text-xs text-gray-600">检查更新中...</span>
        </div>
    </div>
    <div x-data="announcement()" x-init="fetch()" class="mb-4" x-show="visible">
        <div class="bg-blue-900/30 border border-blue-700 rounded-lg p-4 text-blue-200 text-sm leading-relaxed prose-a:text-blue-300 prose-a:underline prose-a:hover:text-blue-100 flex items-start">
            <svg class="w-5 h-5 mr-3 flex-shrink-0 mt-0.5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
            <div x-html="content" class="flex-1"></div>
            <button @click="dismiss()" class="ml-3 flex-shrink-0 text-blue-400 hover:text-blue-200 transition-colors" title="关闭">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6" x-data="dashboardStats()" x-init="fetchStats()">
        <div class="card">
            <p class="text-gray-400 text-sm">CPU 使用率</p>
            <p class="text-3xl font-bold text-white mt-2" x-text="stats.cpu_percent?.toFixed(1) + '%'">--</p>
        </div>
        <div class="card">
            <p class="text-gray-400 text-sm">内存使用率</p>
            <p class="text-3xl font-bold text-white mt-2" x-text="stats.memory_percent?.toFixed(1) + '%'">--</p>
            <p class="text-xs text-gray-500 mt-1" x-text="formatBytes(stats.memory_used_bytes) + ' / ' + formatBytes(stats.memory_total_bytes)"></p>
        </div>
        <div class="card">
            <p class="text-gray-400 text-sm">磁盘使用率</p>
            <p class="text-3xl font-bold text-white mt-2" x-text="stats.disk_total_bytes ? (stats.disk_used_bytes / stats.disk_total_bytes * 100).toFixed(1) + '%' : '--' ">--</p>
            <p class="text-xs text-gray-500 mt-1" x-text="formatBytes(stats.disk_used_bytes) + ' / ' + formatBytes(stats.disk_total_bytes)"></p>
        </div>
        <div class="card">
            <p class="text-gray-400 text-sm">系统负载</p>
            <p class="text-3xl font-bold text-white mt-2" x-text="stats.load_avg_1?.toFixed(1)">--</p>
            <p class="text-xs text-gray-500 mt-1" x-text="stats.load_avg_5?.toFixed(1) + ' / ' + stats.load_avg_15?.toFixed(1)"></p>
        </div>
        <div class="card">
            <p class="text-gray-400 text-sm">运行时间</p>
            <p class="text-3xl font-bold text-white mt-2" x-text="formatUptime(stats.uptime)">--</p>
        </div>
    </div>

    <div class="card mb-6" x-data="{ range: '24h' }">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold text-white">历史趋势</h3>
            <div class="flex space-x-1">
                <button @click="range='24h'; fetchMetrics('24h')" :class="range === '24h' ? 'btn-primary text-xs' : 'btn-secondary text-xs'" class="py-1 px-3">24小时</button>
                <button @click="range='7d'; fetchMetrics('7d')" :class="range === '7d' ? 'btn-primary text-xs' : 'btn-secondary text-xs'" class="py-1 px-3">7天</button>
                <button @click="range='15d'; fetchMetrics('15d')" :class="range === '15d' ? 'btn-primary text-xs' : 'btn-secondary text-xs'" class="py-1 px-3">15天</button>
            </div>
        </div>
        <canvas id="metricsCanvas" class="w-full" height="80"></canvas>
    </div>

    <div class="card mb-6" x-data="siteResources()" x-init="initFetch()">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold text-white">网站资源</h3>
            <div class="flex items-center space-x-3">
                <span class="text-xs text-gray-500" x-show="since" x-text="since"></span>
                <button @click="fetch()" class="btn-secondary text-xs py-1 px-3">刷新</button>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="border-b border-gray-700 text-gray-400">
                    <tr>
                        <th class="py-2 text-left">网站</th>
                        <th class="py-2 text-right w-20">CPU</th>
                        <th class="py-2 text-right w-20">内存</th>
                        <th class="py-2 text-right w-20">进程</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="s in sites" :key="s.domain">
                        <tr class="border-b border-gray-700/30" :class="s.cpu > 20 ? 'bg-red-900/20' : (s.cpu > 5 ? 'bg-yellow-900/10' : '')">
                            <td class="py-2">
                                <a :href="'/{{$.RandomSuffix}}/websites/' + s.site_id" class="text-blue-400 hover:text-blue-300 hover:underline" x-text="s.domain"></a>
                            </td>
                            <td class="py-2 text-right font-mono" :class="s.cpu > 20 ? 'text-red-400' : (s.cpu > 5 ? 'text-yellow-400' : 'text-white')" x-text="s.cpu.toFixed(1) + '%'"></td>
                            <td class="py-2 text-right font-mono text-gray-300" x-text="s.mem.toFixed(1) + '%'"></td>
                            <td class="py-2 text-right font-mono text-gray-400" x-text="s.proc_count"></td>
                        </tr>
                    </template>
                    <tr x-show="sites.length === 0">
                        <td colspan="4" class="py-4 text-center text-gray-500">暂无运行中的网站进程</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <p class="text-xs text-gray-600 mt-3">通过扫描各网站 PHP-FPM 进程的系统用户，聚合每个站点所有进程的 CPU 和内存占用。刷新间隔 30 秒。</p>
    </div>
</div>

<script>
function versionCheck() {
    return {
        hasUpdate: false,
        checking: false,
        latestVersion: '',
        sysCount: 0,
        async check() {
            this.checking = true;
            try {
                const r = await api('/update/check');
                if (r.success && r.data.has_update) {
                    this.hasUpdate = true;
                    this.latestVersion = r.data.latest_version;
                }
            } catch(e) {}
            try {
                const r2 = await api('/system/updates');
                if (r2.success) {
                    this.sysCount = r2.data.count || 0;
                }
            } catch(e) {}
            this.checking = false;
        }
    }
}

function announcement() {
    return {
        content: '',
        visible: false,
        async fetch() {
            try {
                const resp = await api('/announcement');
                if (resp.success && resp.data.content) {
                    this.content = resp.data.content;
                    const dismissed = localStorage.getItem('dismissed_announcement');
                    this.visible = this.content !== dismissed;
                }
            } catch(e) {}
        },
        dismiss() {
            localStorage.setItem('dismissed_announcement', this.content);
            this.visible = false;
        }
    }
}

function dashboardStats() {
    return {
        stats: {},
        async fetchStats() {
            try {
                const resp = await api('/dashboard/stats');
                if (resp.success) this.stats = resp.data;
            } catch (e) { console.error(e); }
        }
    }
}

// Chart.js — initialized outside Alpine to avoid proxy conflict
(function() {
    let chart = null;

    async function fetchMetrics(range) {
        try {
            const resp = await api('/dashboard/metrics?range=' + (range || '24h'));
            if (resp.success && chart) {
                chart.data.labels = resp.data.labels || [];
                chart.data.datasets[0].data = resp.data.cpu || [];
                chart.data.datasets[1].data = resp.data.memory || [];
                chart.data.datasets[2].data = resp.data.load || [];
                chart.update('none');
            }
        } catch (e) { console.error(e); }
    }

    function initChart() {
        const canvas = document.getElementById('metricsCanvas');
        if (!canvas) return;
        chart = new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'CPU %', borderColor: '#3b82f6', backgroundColor: '#3b82f6', data: [], tension: 0.3, pointRadius: 0, pointHoverRadius: 5 },
                    { label: '内存 %', borderColor: '#22c55e', backgroundColor: '#22c55e', data: [], tension: 0.3, pointRadius: 0, pointHoverRadius: 5 },
                    { label: '负载', borderColor: '#eab308', backgroundColor: '#eab308', data: [], tension: 0.3, pointRadius: 0, pointHoverRadius: 5 },
                ]
            },
            options: {
                responsive: true,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                scales: {
                    x: {
                        ticks: { color: '#9ca3af', maxTicksLimit: 12, maxRotation: 0 },
                        grid: { color: '#374151' }
                    },
                    y: {
                        ticks: { color: '#9ca3af' },
                        grid: { color: '#374151' }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#9ca3af' } },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            title: function(items) {
                                return '时间: ' + items[0].label;
                            },
                            label: function(item) {
                                return item.dataset.label + ': ' + item.parsed.y.toFixed(2);
                            }
                        }
                    }
                }
            }
        });
        fetchMetrics('24h');
    }

    // Expose for Alpine button clicks
    window.fetchMetrics = fetchMetrics;
    // Canvas is already in DOM since script runs after template render
    initChart();
})();

function siteResources() {
    return {
        sites: [],
        since: '',
        timer: null,
        async fetch() {
            try {
                const r = await api('/dashboard/site-resources');
                if (r.success) this.sites = r.data || [];
                const now = new Date();
                this.since = now.toLocaleTimeString('zh-CN');
            } catch(e) {}
        },
        initFetch() {
            this.fetch();
            this.timer = setInterval(() => this.fetch(), 30000);
        }
    }
}
</script>
{{end}}
