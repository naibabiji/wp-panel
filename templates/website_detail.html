{{template "base" .}}
{{define "websites_detail_content"}}
<div x-data="websiteDetail()" x-init="init()">

    <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-white">网站详情</h2>
        <a href="/{{.RandomSuffix}}/websites" class="btn-secondary">返回列表</a>
    </div>

    <div x-show="loading" class="text-center py-8">
        <div class="animate-spin w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto"></div>
    </div>
<template x-if="site">
    <div>

    <!-- Row 1: 基本信息 | 网站监控 + 数据库 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="card">
            <h3 class="text-lg font-semibold text-white mb-4">基本信息</h3>
            <dl class="space-y-3">
                <div><dt class="text-sm text-gray-400">域名</dt><dd><a :href="(site.ssl_enabled ? 'https' : 'http') + '://' + site.domain" target="_blank" class="text-blue-400 hover:text-blue-300 hover:underline" x-text="site.domain"></a></dd></div>
                <div><dt class="text-sm text-gray-400">别名</dt><dd class="text-white" x-text="site.aliases || '无'"></dd></div>
                <div class="pt-2">
                    <button @click="domainModalOpen = true; editDomain = site.domain; editAliasesStr = site.aliases || ''" class="text-sm py-1.5 px-3 rounded" style="background-color: #1e3a5f; color: #93c5fd;">编辑域名</button>
                    <a :href="(document.body.dataset.panelPrefix || '') + '/files?site_id=' + site.id" class="text-sm py-1.5 px-3 rounded ml-2 inline-block" style="background-color: #1e3a5f; color: #93c5fd;">文件管理</a>
                </div>
                <div><dt class="text-sm text-gray-400">状态</dt><dd><span :class="site.status === 'active' ? 'badge-success' : 'badge-warning'" x-text="site.status === 'active' ? '运行中' : '已暂停'"></span></dd></div>
                <div><dt class="text-sm text-gray-400">类型</dt><dd class="text-white" x-text="site.site_type === 'php' ? '通用 PHP 网站' : 'WordPress'"></dd></div>
                <div class="pt-2 border-t border-gray-700/50">
                    <dt class="text-sm text-gray-400 mb-2">CDN 真实 IP</dt>
                    <div class="rounded border border-blue-900/60 bg-blue-950/30 p-2 mb-2 text-xs text-blue-200">
                        <p>Cloudflare 真实 IP 已由系统自动处理，无需在这里选择。</p>
                        <p class="mt-1 text-blue-200/80">这里仅用于阿里云 ESA、腾讯 EdgeOne、又拍云或其他非 Cloudflare CDN。</p>
                    </div>
                    <label class="flex items-center space-x-2 text-sm text-gray-300 mb-2">
                        <input type="checkbox" x-model="cdnRealIPEnabled">
                        <span>启用其他 CDN 真实 IP</span>
                    </label>
                    <div x-show="cdnRealIPEnabled" class="space-y-2">
                        <template x-for="g in selectableCDNGroups()" :key="g.id">
                            <label class="flex items-start space-x-2 text-sm text-gray-300">
                                <input type="checkbox" class="mt-1" :value="g.id" x-model="cdnRealIPGroupIDs" :disabled="!g.enabled">
                                <span>
                                    <span class="text-white" x-text="g.name"></span>
                                    <span class="text-xs text-gray-500" x-text="' · ' + g.header_name"></span>
                                </span>
                            </label>
                        </template>
                        <p x-show="selectableCDNGroups().length === 0" class="text-xs text-gray-500">暂无可选择的非 Cloudflare CDN 配置组，请先到安全设置中新增。</p>
                        <p class="text-xs text-gray-500" x-text="cdnRealIPModeText()"></p>
                    </div>
                    <button @click="saveCDNRealIP()" :disabled="cdnRealIPSaving" class="btn-primary text-sm mt-2" x-text="cdnRealIPSaving ? '保存中...' : '保存其他 CDN 设置'"></button>
                </div>
                <div><dt class="text-sm text-gray-400">系统用户</dt><dd class="text-white font-mono" x-text="site.system_user"></dd></div>
                <div><dt class="text-sm text-gray-400">网站根目录</dt><dd class="text-white font-mono text-sm" x-text="site.web_root"></dd></div>
                <div><dt class="text-sm text-gray-400">日志目录</dt><dd class="text-white font-mono text-sm" x-text="site.log_dir"></dd></div>
                <div>
                    <dt class="text-sm text-gray-400">到期时间</dt>
                    <dd class="text-white" x-show="!editingExpiry" x-text="site.expires_at ? new Date(site.expires_at).toLocaleDateString('zh-CN') : '未设置'"></dd>
                    <div x-show="editingExpiry" class="flex items-center space-x-2">
                        <input type="date" x-model="expiresAtInput" class="input-field text-sm py-1 w-44">
                        <button @click="saveExpiry()" :disabled="expirySaving" class="btn-primary text-xs py-1 px-2" x-text="expirySaving ? '保存中...' : '保存'"></button>
                        <button @click="editingExpiry = false" class="text-gray-400 hover:text-white text-xs">取消</button>
                    </div>
                </div>
                <div class="pt-1" x-show="!editingExpiry">
                    <button @click="editingExpiry = true; expiresAtInput = site.expires_at ? site.expires_at.substring(0, 10) : ''" class="text-xs py-1 px-2 rounded" style="background-color: #1e3a5f; color: #93c5fd;">编辑到期时间</button>
                </div>
            </dl>
        </div>

        <div class="card">
            <h3 class="text-lg font-semibold text-white mb-4">网站监控</h3>
            <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer mb-3">
                <input type="checkbox" x-model="monitoringEnabled">
                <span>启用网站监控</span>
            </label>
            <div x-show="monitoringEnabled" class="flex items-center space-x-2 mb-4">
                <span class="text-xs text-gray-500">检测间隔</span>
                <select x-model="monitoringInterval" class="input-field w-24 text-sm py-1">
                    <option value="1">1 分钟</option>
                    <option value="5">5 分钟</option>
                    <option value="10">10 分钟</option>
                    <option value="30">30 分钟</option>
                </select>
            </div>
            <button @click="saveMonitoring()" :disabled="monitoringSaving" class="btn-primary text-sm" x-text="monitoringSaving ? '保存中...' : '保存设置'"></button>
            <p x-show="monitoringEnabled" class="text-xs text-gray-500 mt-3">定期检测网站 HTTP 状态码，异常时通过告警通知发送邮件。需先在「告警通知」页面配置 SMTP。</p>
            <p x-show="!monitoringEnabled" class="text-xs text-gray-600 mt-3">开启后可定期检测网站是否可访问，异常时邮件通知。</p>

            <hr class="my-5 border-gray-700">

            <h3 class="text-lg font-semibold text-white mb-4">数据库</h3>
            <dl class="space-y-3 mb-4">
                <div><dt class="text-sm text-gray-400">数据库名</dt><dd class="text-white font-mono text-sm" x-text="site.db_name"></dd></div>
                <div><dt class="text-sm text-gray-400">用户名</dt><dd class="text-white font-mono text-sm" x-text="site.db_user"></dd></div>
                <div x-show="site.site_type === 'wordpress'">
                    <dt class="text-sm text-gray-400">表前缀</dt>
                    <dd class="flex items-center space-x-2 mt-1">
                        <input type="text" x-model="editTablePrefix" class="input-field text-sm font-mono py-1 w-28" placeholder="如 wp_">
                        <button @click="detectTablePrefix()" :disabled="detectingPrefix" class="text-xs py-1 px-2 rounded" style="background-color: #1e3a5f; color: #93c5fd;" x-text="detectingPrefix ? '检测中...' : '自动检测'"></button>
                    </dd>
                    <p class="text-xs text-gray-500 mt-1">搬家后如数据库表前缀与 wp-config.php 不一致，可在此修改。点击「自动检测」从数据库读取实际前缀。</p>
                </div>
            </dl>
            <button @click="dbPasswordModal = true" class="text-sm py-1.5 px-3 rounded" style="background-color: #1e3a5f; color: #93c5fd;">修改密码</button>
            <button @click="fixWPConfig()" :disabled="dbSubmitting" class="text-sm py-1.5 px-3 rounded ml-2" style="background-color: #14532d; color: #86efac;" x-text="dbSubmitting ? '处理中...' : '同步数据库信息'"></button>
            <button @click="openSiteURLModal()" x-show="site.site_type === 'wordpress'" class="text-sm py-1.5 px-3 rounded ml-2" style="background-color: #1e3a5f; color: #93c5fd;">修改站点URL</button>
            <button @click="clearDatabase()" :disabled="dbSubmitting" class="text-sm py-1.5 px-3 rounded ml-2" style="background-color: #7f1d1d; color: #fca5a5;" x-text="dbSubmitting ? '清空中...' : '清空数据库'"></button>

            <hr class="my-4 border-gray-700">

            <div class="flex items-center space-x-3 mb-3">
                <button @click="createBackup()" :disabled="backupSubmitting" class="btn-primary text-sm" x-text="backupSubmitting ? '备份中...' : '手动备份'"></button>
                <button @click="uploadRestore()" :disabled="restoreUploading" class="btn-secondary text-sm" x-text="restoreUploading ? '恢复中...' : '上传恢复'"></button>
                <input type="file" id="restoreFileInput" @change="handleRestoreUpload($event)" accept=".sql,.sql.gz,.gz,.zip" class="hidden">
            </div>

            <div class="flex items-center space-x-3 mb-3 p-2 rounded" style="background-color: #0f172a;">
                <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer">
                    <input type="checkbox" x-model="backupEnabled" @change="saveBackupSettings()">
                    <span>自动备份（每天 4:00）</span>
                </label>
                <label class="flex items-center space-x-2 text-sm text-gray-300 ml-4">
                    <span>保留</span>
                    <input type="number" x-model.number="backupKeepCount" @change="saveBackupSettings()" class="input-field w-16 text-sm py-0.5 text-center" min="1" max="30">
                    <span>份</span>
                </label>
            </div>

            <details class="mb-2">
                <summary class="cursor-pointer text-blue-400 hover:text-blue-300 text-xs" x-text="`备份列表（${backups.length} 份）`"></summary>
                <div class="overflow-x-auto mt-2">
                    <table class="w-full text-sm">
                        <thead class="border-b border-gray-700 text-gray-400">
                            <tr>
                                <th class="py-2 text-left whitespace-nowrap">文件名</th>
                                <th class="py-2 text-left whitespace-nowrap">大小</th>
                                <th class="py-2 text-left whitespace-nowrap">时间</th>
                                <th class="py-2 text-left whitespace-nowrap">类型</th>
                                <th class="py-2 text-left w-36">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="b in backups" :key="b.id">
                                <tr class="border-b border-gray-700/50">
                                    <td class="py-2 font-mono text-xs whitespace-nowrap" x-text="b.filename"></td>
                                    <td class="py-2 text-xs whitespace-nowrap" x-text="formatBytes(b.file_size)"></td>
                                    <td class="py-2 text-xs whitespace-nowrap" x-text="new Date(b.created_at).toLocaleString('zh-CN')"></td>
                                    <td class="py-2 whitespace-nowrap"><span :class="b.auto ? 'badge-info' : 'badge-success'" class="text-xs" x-text="b.auto ? '自动' : '手动'"></span></td>
                                    <td class="py-2">
                                        <div class="flex flex-wrap gap-1">
                                            <button @click="downloadBackup(b)" class="btn-primary text-xs py-1 px-2">下载</button>
                                            <button @click="restoreBackup(b)" :disabled="restoringId" class="text-xs py-1 px-2 rounded" style="background-color: #7f1d1d; color: #fca5a5;" x-text="restoringId === b.id ? '恢复中...' : '恢复'"></button>
                                            <button @click="deleteBackup(b)" :disabled="restoringId" class="btn-secondary text-xs py-1 px-2">删除</button>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                            <tr x-show="backups.length === 0">
                                <td colspan="5" class="py-4 text-center text-gray-500">暂无备份记录</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </details>
        </div>
    </div>

    <!-- Row 2: SSL + Nginx | WordPress优化 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-6">
        <div class="card">
            <h3 class="text-lg font-semibold text-white mb-4">SSL 证书管理</h3>
            <div class="mb-3">
                <span :class="site.ssl_enabled ? 'badge-success' : site.ssl_last_error ? 'badge-warning' : 'badge-info'" class="text-sm" x-text="site.ssl_enabled ? '已启用' : site.ssl_last_error ? '待处理' : '未启用'"></span>
            </div>
            <div x-show="!site.ssl_enabled && site.ssl_last_error" class="mb-4 p-3 bg-yellow-900/40 border border-yellow-700 rounded-lg text-yellow-200 text-sm">
                <p class="font-medium mb-1">上次 SSL 申请失败</p>
                <p x-text="site.ssl_last_error"></p>
            </div>
            <div x-show="site.ssl_enabled">
                <dl class="space-y-3 mb-4">
                    <div><dt class="text-sm text-gray-400">证书路径</dt><dd class="text-white font-mono text-sm break-all" x-text="site.ssl_cert_path"></dd></div>
                    <div><dt class="text-sm text-gray-400">私钥路径</dt><dd class="text-white font-mono text-sm break-all" x-text="site.ssl_key_path"></dd></div>
                    <div><dt class="text-sm text-gray-400">到期时间</dt><dd class="text-white" x-text="site.ssl_expires_at ? new Date(site.ssl_expires_at).toLocaleDateString('zh-CN') : '未知'"></dd></div>
                </dl>
                <div class="flex space-x-3">
                    <button @click="sslMode='auto'; sslModalOpen=true" class="text-sm py-1.5 px-3 rounded" style="background-color: #166534; color: #bbf7d0;">重新申请</button>
                    <button @click="sslMode='manual'; sslCert=''; sslKey=''; sslModalOpen=true" class="text-sm py-1.5 px-3 rounded" style="background-color: #1e3a5f; color: #93c5fd;">替换证书</button>
                    <button @click="removeSSL()" class="text-sm py-1.5 px-3 rounded" style="background-color: #7f1d1d; color: #fca5a5;">删除证书</button>
                </div>
            </div>
            <div x-show="!site.ssl_enabled">
                <p class="text-gray-400 mb-4">该网站尚未启用 SSL 证书</p>
                <button @click="sslMode='auto'; sslModalOpen=true" class="btn-primary">启用 SSL</button>
            </div>

            <hr class="my-5 border-gray-700">

            <h3 class="text-lg font-semibold text-white mb-2">Nginx 自定义配置</h3>
            <details class="mb-4">
                <summary class="cursor-pointer text-blue-400 hover:text-blue-300 text-xs">配置说明与示例</summary>
                <div class="mt-2 ml-2 space-y-2 text-gray-500 text-xs">
                    <p><strong class="text-gray-400">pre.conf</strong> — 位于 <code class="text-gray-400">root</code> 指令之前，适合设置上传大小限制、早期 rewrite 等需要在请求处理最前端生效的指令。</p>
                    <pre class="bg-gray-900 p-2 rounded leading-relaxed"># 上传文件大小限制
client_max_body_size 128m;

# 自定义变量（供 .conf 使用）
set $custom_var "value";</pre>
                    <p><strong class="text-gray-400">.conf</strong> — 位于 <code class="text-gray-400">location</code> 块之前，适合添加自定义 location 块、缓存绕过规则、插件 rewrite 等。</p>
                    <pre class="bg-gray-900 p-2 rounded leading-relaxed"># 绕过 FastCGI 缓存：指定路径不走缓存
if ($request_uri ~* "/ai-assistant") {
    set $wp_skip_cache 1;
}

# 绕过缓存：指定 Cookie 不走缓存
if ($http_cookie ~* "my_app_session") {
    set $wp_skip_cache 1;
}

# 自定义 location 块
location ^~ /api/ {
    proxy_pass http://127.0.0.1:3000;
}</pre>
                    <p class="text-yellow-500">⚠️ pre.conf 和 .conf 都在 server 级别生效，不要将 location 块嵌套到其他 location 中。</p>
                </div>
            </details>
            <div class="mb-3">
                <label class="block text-sm text-gray-300 mb-1">Server 级配置（pre.conf — root 指令之前）</label>
                <textarea x-model="nginxPreContent" rows="3" class="w-full rounded p-2 text-xs font-mono" style="background-color: #0f172a; border: 1px solid #334155; color: #e2e8f0; resize: vertical;" placeholder="client_max_body_size 128m;"></textarea>
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-300 mb-1">Location 级配置（.conf — location 块之前，缓存绕过规则写这里）</label>
                <textarea x-model="nginxContent" rows="6" class="w-full rounded p-2 text-xs font-mono" style="background-color: #0f172a; border: 1px solid #334155; color: #e2e8f0; resize: vertical;" placeholder="if ($request_uri ~* &quot;/ai-assistant&quot;) { set $wp_skip_cache 1; }"></textarea>
            </div>
            <div class="flex space-x-3">
                <button @click="saveNginxCustom()" :disabled="nginxSubmitting" class="btn-primary text-sm" x-text="nginxSubmitting ? '校验中...' : '保存并生效'"></button>
                <button @click="fetchNginxCustom()" class="text-sm py-1.5 px-3 rounded" style="background-color: #1e293b; border: 1px solid #334155; color: #e2e8f0;">刷新</button>
            </div>
        </div>

        <div class="card">
            <h3 class="text-lg font-semibold text-white mb-4">WordPress优化</h3>
            <div class="flex items-center space-x-3 mb-3">
                <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer">
                    <input type="checkbox" x-model="fcacheEnabled">
                    <span>开启 FastCGI 缓存</span>
                </label>
            </div>
            <div x-show="fcacheEnabled" class="mb-3 ml-6">
                <label class="text-sm text-gray-300 mb-1 block">缓存有效期（秒）</label>
                <input type="number" x-model="fcacheTTL" class="input-field w-32 text-sm py-1" min="10" max="86400">
            </div>
            <div class="flex items-center space-x-3 mb-3">
                <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer">
                    <input type="checkbox" x-model="disableWPUpdates">
                    <span>禁止检测更新（核心/插件/主题）</span>
                </label>
            </div>
            <div class="flex items-center space-x-3 mb-4">
                <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer">
                    <input type="checkbox" x-model="disableFileEditing">
                    <span>禁止后台文件编辑</span>
                </label>
            </div>
            <div class="flex items-center space-x-3 mb-3" x-show="site.site_type === 'wordpress'">
                <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer">
                    <input type="checkbox" x-model="wpDebug">
                    <span>启用调试模式（WP_DEBUG）</span>
                </label>
            </div>
            <div x-show="wpDebug" class="mb-3 ml-6">
                <p class="text-xs text-gray-400">开启后 PHP 错误和警告写入 wp-content/debug.log，排查网站问题时临时开启，正常使用请关闭。</p>
            </div>
            <div class="flex items-center space-x-3 mb-3" x-show="site.site_type === 'wordpress'">
                <label class="text-sm text-gray-300">
                    <span>文章修订版本数</span>
                    <input type="number" :value="wpPostRevisions >= 0 ? wpPostRevisions : ''" @input="wpPostRevisions = $event.target.value === '' ? -1 : parseInt($event.target.value)" class="input-field w-24 text-sm py-1 ml-2" placeholder="默认">
                </label>
                <span class="text-xs text-gray-500">留空=WordPress默认（无限制），0=不保留修订，建议设3~5减少数据库占用</span>
            </div>
            <div class="flex items-center space-x-3 mb-3" x-show="site.site_type === 'wordpress'">
                <label class="text-sm text-gray-300">
                    <span>PHP 内存限制</span>
                    <input type="text" x-model="wpMemoryLimit" class="input-field w-24 text-sm py-1 ml-2" placeholder="默认 40M">
                </label>
                <span class="text-xs text-gray-500">如 128M、256M，遇到内存不足错误（白屏/500）时调高</span>
            </div>
            <div class="flex items-center space-x-3 mb-4" x-show="site.site_type === 'wordpress'">
                <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer">
                    <input type="checkbox" x-model="xmlrpcEnabled">
                    <span>允许 XML-RPC 接口</span>
                </label>
                <span class="text-xs text-gray-500">默认关闭，开启后 /xmlrpc.php 可被访问</span>
            </div>
            <div class="flex items-center space-x-3 mb-3">
                <button @click="saveWPOptimizations()" :disabled="optimizationSaving" class="btn-primary text-sm" x-text="optimizationSaving ? '保存中...' : '保存设置'"></button>
                <button x-show="fcacheEnabled" @click="clearFCache()" class="text-sm py-1.5 px-3 rounded" style="background-color: #7f1d1d; color: #fca5a5;">清除缓存</button>
            </div>
            <div x-show="(fcacheEnabled || disableWPUpdates || disableFileEditing || wpDebug) && site.site_type === 'wordpress'" class="flex items-center space-x-3 mb-3">
                <button x-show="pluginStatus === 'not_installed'" @click="installPlugin()" :disabled="pluginInstalling" class="btn-primary text-sm py-1.5" x-text="pluginInstalling ? '安装中...' : '安装配套插件'"></button>
                <button x-show="pluginStatus === 'update_available'" @click="installPlugin()" :disabled="pluginInstalling" class="text-sm py-1.5 px-3 rounded" style="background-color: #166534; color: #bbf7d0;" x-text="pluginInstalling ? '更新中...' : '更新配套插件'"></button>
                <span x-show="pluginStatus === 'installed'" class="text-xs text-green-400">✓ 插件已安装</span>
            </div>
            <div class="mt-3 p-3 rounded text-xs" style="background-color: #0f172a;">
                <p class="text-gray-300 font-medium mb-2">FastCGI 缓存工作原理</p>
                <ul class="text-gray-400 space-y-1 list-disc list-inside">
                    <li>Nginx 将 PHP 页面输出为静态 HTML 缓存在磁盘，访客直接拿到 HTML 无需经过 PHP/MariaDB</li>

                    <li>如果浏览器仍跳转到旧网站，可能是浏览器缓存影响，建议清理浏览器缓存后再访问</li>

<script>
function websiteDetail() {
    return {
        site: null,
        loading: true,
        sslModalOpen: false,
        sslMode: 'auto',
        sslCert: '',
        sslKey: '',
        sslSubmitting: false,
        dbPasswordModal: false,
        newDBPassword: '',
        dbSubmitting: false,
        backups: [],
        backupSubmitting: false,
        backupEnabled: false,
        backupKeepCount: 7,
        restoringId: null,
        restoreUploading: false,
        restorePollingActive: true,
        logType: 'access',
        logContent: '',
        logFullscreen: false,
        nginxPreContent: '',
        nginxContent: '',
        nginxSubmitting: false,
        fcacheEnabled: false,
        fcacheTTL: 300,
        disableWPUpdates: false,
        disableFileEditing: false,
        xmlrpcEnabled: false,
        wpDebug: false,
        wpPostRevisions: -1,
        wpMemoryLimit: '',
        logRetentionDays: 7,
        optimizationSaving: false,
        pluginStatus: 'not_installed',
        pluginInstalling: false,
        monitoringEnabled: false,
        monitoringInterval: 5,
        monitoringSaving: false,
        cdnGroups: [],
        cdnRealIPEnabled: false,
        cdnRealIPGroupIDs: [],
        cdnRealIPSaving: false,
        accessLogMode: 'off',
        expiresAtInput: '',
        editingExpiry: false,
        expirySaving: false,
        domainModalOpen: false,
        editDomain: '',
        editAliasesStr: '',
        domainSubmitting: false,
        editTablePrefix: '',
        detectingPrefix: false,
        siteURLModal: false,
        currentSiteURL: '',
        currentHomeURL: '',
        newSiteURL: '',
        newHomeURL: '',
        siteURLSubmitting: false,
        init() {
            this.restorePollingActive = true;
            window.addEventListener('beforeunload', () => { this.restorePollingActive = false; });
            this.fetchDetail();
        },
        async fetchDetail() {
            const id = window.location.pathname.split('/').pop();
            try {
                const r = await api('/websites/' + id);
                if (r.success) {
                    this.site = r.data;
                    this.fcacheEnabled = r.data.fastcgi_cache_enabled;
                    this.fcacheTTL = r.data.fastcgi_cache_ttl || 300;
                    this.disableWPUpdates = r.data.disable_wp_updates || false;
                    this.disableFileEditing = r.data.disable_file_editing || false;
                    this.xmlrpcEnabled = r.data.xmlrpc_enabled || false;
                    this.wpDebug = r.data.wp_debug_enabled || false;
                    this.wpPostRevisions = r.data.wp_post_revisions != null ? r.data.wp_post_revisions : -1;
                    this.wpMemoryLimit = r.data.wp_memory_limit || '';
                    this.logRetentionDays = r.data.log_retention_days || 7;
                    this.monitoringEnabled = r.data.monitoring_enabled || false;
                    this.monitoringInterval = r.data.monitoring_interval || 5;
                    this.cdnRealIPEnabled = r.data.cdn_realip_enabled || false;
                    this.cdnRealIPGroupIDs = (r.data.cdn_realip_groups || []).map(g => g.id);
                    this.editTablePrefix = r.data.table_prefix || '';
                }
            } catch(e) { showToast('加载失败: ' + e.message, 'error'); }
            this.loading = false;
            this.fetchNginxCustom();
            this.fetchPluginStatus();
            this.fetchLogs();
            this.fetchBackups();
            this.fetchBackupSettings();
            this.fetchCDNGroups();
        },
        async fetchCDNGroups() {
            try {
                const r = await api('/security/cdn-realip-groups');
                if (r.success) {
                    this.cdnGroups = r.data || [];
                    this.normalizeCDNRealIPSelection();
                }
            } catch(e) {}
        },
        selectableCDNGroups() {
            return this.cdnGroups.filter(g => g.provider !== 'cloudflare');
        },
        normalizeCDNRealIPSelection() {
            const currentIDs = this.cdnRealIPGroupIDs.map(id => parseInt(id));
            const selected = this.cdnGroups.filter(g => currentIDs.includes(g.id));
            const selectedNonCloudflareIDs = selected.filter(g => g.provider !== 'cloudflare').map(g => g.id);
            if (this.cdnRealIPEnabled && selected.length > 0 && selectedNonCloudflareIDs.length === 0) {
                this.cdnRealIPEnabled = false;
            }
            this.cdnRealIPGroupIDs = selectedNonCloudflareIDs;
        },
        cdnRealIPModeText() {
            if (!this.cdnRealIPEnabled) return '';
            const currentIDs = this.cdnRealIPGroupIDs.map(id => parseInt(id));
            const selected = this.selectableCDNGroups().filter(g => currentIDs.includes(g.id));
            if (selected.length === 0) return '请选择至少一个非 Cloudflare CDN 配置组。Cloudflare 已由系统自动处理。';
            const headers = [...new Set(selected.map(g => (g.header_name || '').toLowerCase()))];
            if (headers.length > 1) return '所选配置组 Header 不一致，保存时会被拒绝。';
            if (selected.some(g => !(g.ip_ranges || '').trim())) {
                return '兼容模式：未填写可信回源 IP 段，将信任所有来源的真实 IP Header。';
            }
            return '可信 CDN 模式：仅信任所选配置组的回源 IP 段。';
        },
        async saveCDNRealIP() {
            this.cdnRealIPSaving = true;
            try {
                const groupIDs = this.cdnRealIPGroupIDs.map(id => parseInt(id)).filter(id => this.selectableCDNGroups().some(g => g.id === id));
                if (this.cdnRealIPEnabled && groupIDs.length === 0) {
                    showToast('请选择至少一个非 Cloudflare CDN 配置组；Cloudflare 已由系统自动处理，无需保存。', 'error');
                    return;
                }
                const r = await api('/websites/' + this.site.id + '/cdn-realip', {
                    method: 'PUT',
                    body: { enabled: this.cdnRealIPEnabled, group_ids: groupIDs }
                });
                showToast(r.data?.message || 'CDN 真实 IP 已保存', 'success');
                await this.fetchDetail();
            } catch(e) { showToast(e.message, 'error'); }
            finally { this.cdnRealIPSaving = false; }
        },
        async enableSSL() {
            if (this.sslMode === 'manual' && (!this.sslCert || !this.sslKey)) {
                showToast('请填写证书内容和私钥', 'error');
                return;
            }
            this.sslSubmitting = true;
            try {
                const body = { mode: this.sslMode };
                if (this.sslMode === 'manual') {
                    body.certificate = this.sslCert;
                    body.private_key = this.sslKey;
                }
                const r = await api('/websites/' + this.site.id + '/ssl', { method: 'POST', body });
                if (r.success) {
                    showToast(r.data?.message || '操作成功', 'success');
                    this.sslModalOpen = false;
                    await this.fetchDetail();
                } else {
                    showToast(r.data?.message || '操作失败', 'error');
                }
            } catch(e) { showToast('操作失败: ' + e.message, 'error'); }
            this.sslSubmitting = false;
        },
        async updateDomains() {
            this.domainSubmitting = true;
            try {
                const newDomain = this.editDomain.trim();
                if (!newDomain) { showToast('域名不能为空', 'error'); this.domainSubmitting = false; return; }
                const aliases = this.editAliasesStr.split('\n').map(a => a.trim()).filter(a => a);
                const body = { new_domain: newDomain, aliases };
                const r = await api('/websites/' + this.site.id + '/domains', { method: 'PUT', body });
                if (r.success) {
                    showToast(r.data?.message || '已更新', 'success');
                    this.domainModalOpen = false;
                    await this.fetchDetail();
                } else {
                    showToast(r.data?.message || '操作失败', 'error');
                }
            } catch(e) { showToast('操作失败: ' + e.message, 'error'); }
            this.domainSubmitting = false;
        },
        async removeSSL() {
            if (!await confirmModal('确认删除 ' + this.site.domain + ' 的SSL证书？删除后将恢复为HTTP访问。')) return;
            try {
                const r = await api('/websites/' + this.site.id + '/ssl', { method: 'DELETE' });
                if (r.success) {
                    showToast(r.data?.message || '证书已删除', 'success');
                    await this.fetchDetail();
                } else {
                    showToast(r.data?.message || '操作失败', 'error');
                }
            } catch(e) { showToast('操作失败: ' + e.message, 'error'); }
        },
        async changeDBPassword() {
            this.dbSubmitting = true;
            try {
                const body = {};
                if (this.newDBPassword) body.new_password = this.newDBPassword;
                const r = await api('/websites/' + this.site.id + '/db-password', { method: 'PUT', body });
                if (r.success) {
                    showToast('密码已更新: ' + (r.data ? r.data.new_password : '****'), 'success');
                    this.dbPasswordModal = false;
                    this.newDBPassword = '';
                } else {
                    showToast(r.data?.message || '操作失败', 'error');
                }
            } catch(e) { showToast('操作失败: ' + e.message, 'error'); }
            this.dbSubmitting = false;
        },
        async fixWPConfig() {
            const parts = ['将使用当前数据库名和用户名覆盖 wp-config.php 中的 DB_NAME 和 DB_USER'];
            if (this.editTablePrefix) {
                parts.push('同时更新 $table_prefix 为 ' + this.editTablePrefix);
            }
            if (!await confirmModal(parts.join('，') + '，确认继续？')) return;
            this.dbSubmitting = true;
            try {
                const body = {};
                if (this.editTablePrefix) {
                    body.table_prefix = this.editTablePrefix;
                }
                const r = await api('/websites/' + this.site.id + '/fix-wp-config', { method: 'POST', body });
                if (r.success) {
                    showToast(r.data?.message || '已更新', 'success');
                    await this.fetchDetail();
                } else {
                    showToast(r.data?.message || '操作失败', 'error');
                }
            } catch(e) { showToast('操作失败: ' + e.message, 'error'); }
            this.dbSubmitting = false;
        },
        async detectTablePrefix() {
            this.detectingPrefix = true;
            try {
                const r = await api('/websites/' + this.site.id + '/detect-table-prefix');
                if (r.success && r.data.prefix) {
                    this.editTablePrefix = r.data.prefix;
                    const candidates = r.data.candidates || [];
                    if (candidates.length > 1) {
                        showToast('检测到多个可能前缀：' + candidates.join('、') + '。已预选「' + r.data.prefix + '」，如不准确请手动修改', 'warning');
                    } else {
                        showToast('检测到表前缀: ' + r.data.prefix + '，请点击「同步数据库信息」保存', 'success');
                    }
                } else {
                    showToast(r.data?.message || '未检测到表前缀', 'error');
                }
            } catch(e) { showToast('检测失败: ' + e.message, 'error'); }
            this.detectingPrefix = false;
        },
        async openSiteURLModal() {
            this.siteURLModal = true;
            this.currentSiteURL = '';
            this.currentHomeURL = '';
            this.newSiteURL = '';
            this.newHomeURL = '';
            try {
                const r = await api('/websites/' + this.site.id + '/wp-site-urls');
                if (r.success) {
                    this.currentSiteURL = r.data.siteurl || '';
                    this.currentHomeURL = r.data.home || '';
                }
            } catch(e) { showToast('读取当前 URL 失败: ' + e.message, 'error'); }
        },
        autoFillSiteURL() {
            const proto = this.site.ssl_enabled ? 'https' : 'http';
            const url = proto + '://' + this.site.domain;
            this.newSiteURL = url;
            this.newHomeURL = url;
        },
        async updateSiteURLs() {
            if (!this.newSiteURL && !this.newHomeURL) {
                showToast('至少填写一个 URL', 'error');
                return;
            }
            if (!await confirmModal('确认将站点 URL 更新为：\nsiteurl: ' + (this.newSiteURL || '（不变）') + '\nhome: ' + (this.newHomeURL || '（不变）'))) return;
            this.siteURLSubmitting = true;
            try {
                const body = {};
                if (this.newSiteURL) body.siteurl = this.newSiteURL;
                if (this.newHomeURL) body.home = this.newHomeURL;
                const r = await api('/websites/' + this.site.id + '/wp-site-urls', { method: 'PUT', body });
                if (r.success) {
                    showToast('站点 URL 已更新', 'success');
                    this.siteURLModal = false;
                } else {
                    showToast(r.data?.message || '更新失败', 'error');
                }
            } catch(e) { showToast('更新失败: ' + e.message, 'error'); }
            this.siteURLSubmitting = false;
        },
        async clearDatabase() {
            if (!await confirmModal('确认清空数据库「' + this.site.db_name + '」？此操作将删除所有表，不可撤销！')) return;
            this.dbSubmitting = true;
            try {
                const r = await api('/websites/' + this.site.id + '/backups/clear-database', { method: 'POST' });
                if (r.success) {
                    showToast(r.data?.message || '数据库已清空', 'success');
                } else {
                    showToast(r.data?.message || '操作失败', 'error');
                }
            } catch(e) { showToast('操作失败: ' + e.message, 'error'); }
            this.dbSubmitting = false;
        },
        async fetchNginxCustom() {
            try {
                const r = await api('/websites/' + this.site.id + '/nginx-custom');
                if (r.success) {
                    this.nginxPreContent = r.data.pre_content || '';
                    this.nginxContent = r.data.content || '';
                    this.accessLogMode = r.data.access_log_mode || 'off';
                }
            } catch(e) { /* 静默失败 */ }
        },
        async saveNginxCustom() {
            this.nginxSubmitting = true;
            try {
                const r = await api('/websites/' + this.site.id + '/nginx-custom', {
                    method: 'PUT',
                    body: { pre_content: this.nginxPreContent, content: this.nginxContent }
                });
                if (r.success) {
                    showToast(r.data?.message || '已保存', 'success');
                } else {
                    showToast(r.data?.message || '保存失败', 'error');
                }
            } catch(e) { showToast('操作失败: ' + e.message, 'error'); }
            this.nginxSubmitting = false;
        },
        async fetchLogs() {
            if (!this.site) return;
            try {
                const r = await api('/websites/' + this.site.id + '/logs?type=' + this.logType);
                if (r.success) {
                    this.logContent = r.data.content;
                }
            } catch(e) { showToast('加载日志失败: ' + e.message, 'error'); }
        },
        async setAccessLogMode(mode) {
            try {
                const r = await api('/websites/' + this.site.id + '/access-log', { method: 'PUT', body: { mode } });
                if (r.success) {
                    this.accessLogMode = mode;
                    if (mode === 'off') {
                        this.logContent = '';
                    }
                    showToast(r.data?.message, 'success');
                } else {
                    showToast(r.data?.message || '操作失败', 'error');
                }
            } catch(e) { showToast('操作失败: ' + e.message, 'error'); }
        },
        async clearLogs() {
            const label = this.logType === 'error' ? '错误' : (this.logType === 'security' ? '安全' : '访问');
            if (!await confirmModal('确认清空 ' + label + '日志？')) return;
            try {
                const r = await api('/websites/' + this.site.id + '/logs?type=' + this.logType, { method: 'DELETE' });
                if (r.success) {
                    showToast('日志已清空', 'success');
                    this.logContent = '（日志为空或文件不存在）';
                }
            } catch(e) { showToast('操作失败: ' + e.message, 'error'); }
        },
        async fetchBackups() {
            try {
                const r = await api("/websites/" + this.site.id + "/backups");
                if (r.success) this.backups = r.data || [];
            } catch(e) {}
        },
        async fetchBackupSettings() {
            try {
                const r = await api("/websites/" + this.site.id + "/backups/settings");
                if (r.success) { this.backupEnabled = r.data.enabled; this.backupKeepCount = r.data.keep_count; }
            } catch(e) {}
        },
        async createBackup() {
            this.backupSubmitting = true;
            try {
                const r = await api("/websites/" + this.site.id + "/backups", { method: "POST" });
                showToast(r.data?.message || "备份完成", "success");
                await this.fetchBackups();
            } catch(e) { showToast(e.message, "error"); }
            this.backupSubmitting = false;
        },
        async downloadBackup(b) {
            const prefix = document.body.dataset.panelPrefix || "";
            window.open(prefix + "/api/websites/" + this.site.id + "/backups/" + b.id + "/download");
        },
        async restoreBackup(b) {
            if (!await confirmModal("将用 " + b.filename + " 覆盖当前数据库，此操作不可撤销，确认恢复？")) return;
            this.restoringId = b.id;
            try {
                const r = await api("/websites/" + this.site.id + "/backups/" + b.id + "/restore", { method: "POST" });
                const taskId = r.data?.task_id;
                if (!taskId) throw new Error("恢复任务创建失败");
                showToast(r.data?.message || "数据库恢复任务已开始", "info");
                await this.pollRestoreTask(taskId);
            } catch(e) { showToast(e.message, "error"); }
            this.restoringId = null;
        },
        async deleteBackup(b) {
            if (!await confirmModal("确认删除备份 " + b.filename + "？")) return;
            try {
                await api("/websites/" + this.site.id + "/backups/" + b.id, { method: "DELETE" });
                await this.fetchBackups();
                showToast("已删除", "success");
            } catch(e) { showToast(e.message, "error"); }
        },
        uploadRestore() { document.getElementById("restoreFileInput").click(); },
        async handleRestoreUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const validExts = [".sql", ".sql.gz", ".gz", ".zip"];
            if (!validExts.some(ext => file.name.endsWith(ext))) {
                showToast("仅支持 .sql / .sql.gz / .zip 格式", "error"); return;
            }
            if (!await confirmModal("将用 " + file.name + " 覆盖当前数据库，确认恢复？")) { e.target.value = ""; return; }
            this.restoreUploading = true;
            const fd = new FormData();
            fd.append("file", file);
            try {
                const r = await api("/websites/" + this.site.id + "/backups/upload-restore", { method: "POST", body: fd, headers: {} });
                const taskId = r.data?.task_id;
                if (!taskId) throw new Error("恢复任务创建失败");
                showToast(r.data?.message || "数据库恢复任务已开始", "info");
                await this.pollRestoreTask(taskId);
                await this.fetchBackups();
            } catch(e) { showToast(e.message, "error"); }
            this.restoreUploading = false;
            e.target.value = "";
        },
        async pollRestoreTask(taskId) {
            this.restorePollingActive = true;
            for (let i = 0; i < 3600 && this.restorePollingActive; i++) {
                const r = await api("/websites/" + this.site.id + "/backups/restore-tasks/" + encodeURIComponent(taskId));
                const status = r.data || {};
                if (status.status === "success") {
                    showToast(status.message || "数据库恢复成功", "success");
                    return;
                }
                if (status.status === "failed") {
                    throw new Error(status.message || "数据库恢复失败");
                }
                await new Promise(resolve => setTimeout(resolve, 2000));
            }
            if (!this.restorePollingActive) return;
            throw new Error("恢复任务仍在执行，请稍后刷新页面查看结果");
        },
        async fetchPluginStatus() {
            try {
                const r = await api('/websites/' + this.site.id + '/install-plugin/status');
                if (r.success) this.pluginStatus = r.data.status;
            } catch(e) {}
        },
        async installPlugin() {
            this.pluginInstalling = true;
            try {
                const r = await api('/websites/' + this.site.id + '/install-plugin', { method: 'POST' });
                showToast(r.data?.message || '已安装', 'success');
                await this.fetchPluginStatus();
            } catch(e) { showToast(e.message, 'error'); }
            this.pluginInstalling = false;
        },
        async saveMonitoring() {
            this.monitoringSaving = true;
            try {
                await api('/websites/' + this.site.id + '/monitoring', {
                    method: 'PUT',
                    body: { enabled: this.monitoringEnabled, interval: parseInt(this.monitoringInterval) || 5 }
                });
                showToast('监控设置已保存', 'success');
            } catch(e) { showToast('保存失败: ' + e.message, 'error'); }
            this.monitoringSaving = false;
        },
        async saveExpiry() {
            this.expirySaving = true;
            try {
                await api('/websites/' + this.site.id + '/expiry', {
                    method: 'PUT',
                    body: { expires_at: this.expiresAtInput }
                });
                this.site.expires_at = this.expiresAtInput || null;
                this.editingExpiry = false;
                showToast('到期时间已保存', 'success');
            } catch(e) { showToast('保存失败: ' + e.message, 'error'); }
            this.expirySaving = false;
        },
        async saveWPOptimizations() {
            this.optimizationSaving = true;
            try {
                await api('/websites/' + this.site.id + '/wp-optimizations', {
                    method: 'PUT',
                    body: {
                        fcache_enabled: this.fcacheEnabled,
                        fcache_ttl: parseInt(this.fcacheTTL) || 300,
                        disable_wp_updates: this.disableWPUpdates,
                        disable_file_editing: this.disableFileEditing,
                        xmlrpc_enabled: this.xmlrpcEnabled,
                        wp_debug_enabled: this.wpDebug,
                        wp_post_revisions: this.wpPostRevisions,
                        wp_memory_limit: this.wpMemoryLimit
                    }
                });
                showToast('保存成功', 'success');
            } catch(e) { showToast('保存失败: ' + e.message, 'error'); }
            this.optimizationSaving = false;
        },
        async saveLogRetention() {
            try {
                await api('/websites/' + this.site.id + '/log-retention', {
                    method: 'PUT',
                    body: { retention_days: parseInt(this.logRetentionDays) || 0 }
                });
            } catch(e) {}
        },
        async clearFCache() {
            if (!await confirmModal('确认清除 FastCGI 缓存？')) return;
            try {
                await api('/websites/' + this.site.id + '/cache', { method: 'DELETE' });
                showToast('缓存已清除', 'success');
            } catch(e) { showToast(e.message, 'error'); }
        },
        async saveBackupSettings() {
            try {
                await api("/websites/" + this.site.id + "/backups/settings", {
                    method: "PUT",
                    body: { enabled: this.backupEnabled, keep_count: parseInt(this.backupKeepCount) || 7 }
                });
                showToast('备份设置已保存', 'success');
            } catch(e) { showToast(e.message, "error"); }
        },
    }
}
</script>
